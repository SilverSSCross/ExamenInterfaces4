<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Estadísticas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">...</nav>
<div class="container mt-4">
    <h1>Estadísticas</h1>
    <div class="row">
        <div class="col-md-4">
            <div class="card text-white bg-primary">
                <div class="card-header">Total Items</div>
                <div class="card-body">
                    <h2 th:text="${totalItems}"></h2>
                </div>
            </div>
        </div>
    </div>
    <h3 class="mt-4">Stock Bajo</h3>
    <ul>
        <li th:each="item : ${stockBajo}" th:text="${item.title} + ' - ' + ${item.count} + ' uds'"></li>
    </ul>
    <h3>Fabricantes</h3>
    <ul>
        <li th:each="fab : ${fabricantes}" th:text="${fab}"></li>
    </ul>
</div>
</body>
</html>
