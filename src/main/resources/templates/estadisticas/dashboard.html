<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Estadísticas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">...</nav>

<div class="container mt-4">
    <h1>Panel de Estadísticas</h1>

    <div class="row">
        <div class="col-md-4">
            <div class="card text-white bg-primary mb-3">
                <div class="card-header">Total Items</div>
                <div class="card-body">
                    <h2 class="card-title" th:text="${totalItems}"></h2>
                </div>
            </div>
        </div>
    </div>

    <h3 class="mt-4">Items con stock bajo</h3>
    <table class="table table-danger">
        <thead>
        <tr>
            <th>Título</th>
            <th>Stock</th>
            <th>Fabricante</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${stockBajo}">
            <td th:text="${item.title}"></td>
            <td th:text="${item.count}"></td>
            <td th:text="${item.manufacturer}"></td>
        </tr>
        </tbody>
    </table>

    <h3 class="mt-4">Fabricantes</h3>
    <ul class="list-group">
        <li class="list-group-item" th:each="fab : ${fabricantes}" th:text="${fab}"></li>
    </ul>
</div>
</body>
</html>
