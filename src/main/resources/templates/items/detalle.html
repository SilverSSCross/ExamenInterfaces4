<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle del Item</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/">Ejercicio</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/items">Items</a></li>
                <li class="nav-item"><a class="nav-link" href="/estadisticas">Estadísticas</a></li>
                <li class="nav-item"><a class="nav-link" href="/ia">IA</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h1 th:text="${item.title}">Título del Item</h1>

    <div class="row">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h5>Información del Producto</h5>
                </div>
                <div class="card-body">
                    <table class="table">
                        <tr>
                            <th>ID MongoDB:</th>
                            <td th:text="${item.mongoId}"></td>
                        </tr>
                        <tr>
                            <th>ID Original:</th>
                            <td th:text="${item.id}"></td>
                        </tr>
                        <tr>
                            <th>Precio:</th>
                            <td th:text="'$' + ${item.price}"></td>
                        </tr>
                        <tr>
                            <th>Categoría:</th>
                            <td th:text="${item.category}"></td>
                        </tr>
                        <tr>
                            <th>Fabricante:</th>
                            <td th:text="${item.manufacturer}"></td>
                        </tr>
                        <tr>
                            <th>Stock:</th>
                            <td th:text="${item.count}"></td>
                        </tr>
                        <tr>
                            <th>Color:</th>
                            <td th:text="${item.color}"></td>
                        </tr>
                        <tr>
                            <th>EAN:</th>
                            <td th:text="${item.EAN}"></td>
                        </tr>
                        <tr>
                            <th>Valoración:</th>
                            <td th:text="${item.rate} + ' / 5'"></td>
                        </tr>
                    </table>

                    <div class="mt-3">
                        <a th:href="@{'/items/' + ${item.mongoId} + '/editar'}" class="btn btn-warning">Editar</a>
                        <a href="/items" class="btn btn-secondary">Volver al listado</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-info text-white">
                    <h5>Descripción</h5>
                </div>
                <div class="card-body">
                    <p th:text="${item.description}"></p>
                </div>
            </div>

            <div class="card mt-3">
                <div class="card-header bg-success text-white">
                    <h5>Imagen</h5>
                </div>
                <div class="card-body text-center">
                    <img th:src="${item.image}" alt="Imagen del producto" style="max-width: 100%; max-height: 300px;">
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
