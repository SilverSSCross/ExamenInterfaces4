<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Item</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/">Ejercicio</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/items">Items</a></li>
                <li class="nav-item"><a class="nav-link" href="/estadisticas">Estadísticas</a></li>
                <li class="nav-item"><a class="nav-link" href="/ia">IA</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h1>Editar Item: <span th:text="${item.title}"></span></h1>

    <div class="row">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-warning">
                    <h5>Formulario de Edición</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{'/items/' + ${item.mongoId} + '/editar'}" th:object="${item}" method="post">

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="title" class="form-label">Título</label>
                                <input type="text" class="form-control" id="title" th:field="*{title}" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="price" class="form-label">Precio</label>
                                <input type="number" step="0.01" class="form-control" id="price" th:field="*{price}" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="category" class="form-label">Categoría</label>
                                <input type="text" class="form-control" id="category" th:field="*{category}" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="manufacturer" class="form-label">Fabricante</label>
                                <input type="text" class="form-control" id="manufacturer" th:field="*{manufacturer}" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="count" class="form-label">Stock</label>
                                <input type="number" class="form-control" id="count" th:field="*{count}" required>
                            </div>

                            <div class="col-md-4 mb-3">
                                <label for="color" class="form-label">Color</label>
                                <input type="text" class="form-control" id="color" th:field="*{color}">
                            </div>

                            <div class="col-md-4 mb-3">
                                <label for="rate" class="form-label">Valoración</label>
                                <input type="number" step="0.1" min="0" max="5" class="form-control" id="rate" th:field="*{rate}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="EAN" class="form-label">EAN</label>
                            <input type="text" class="form-control" id="EAN" th:field="*{EAN}">
                        </div>

                        <div class="mb-3">
                            <label for="image" class="form-label">URL de la imagen</label>
                            <input type="url" class="form-control" id="image" th:field="*{image}">
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">Descripción</label>
                            <textarea class="form-control" id="description" th:field="*{description}" rows="4" required></textarea>
                        </div>

                        <div class="mt-3">
                            <button type="submit" class="btn btn-primary">Guardar cambios</button>
                            <a th:href="@{'/items/' + ${item.mongoId}}" class="btn btn-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card">
                <div class="card-header bg-info text-white">
                    <h5>Vista previa</h5>
                </div>
                <div class="card-body text-center">
                    <img th:src="${item.image}" alt="Preview" style="max-width: 100%; max-height: 200px;">
                    <h5 class="mt-2" th:text="${item.title}"></h5>
                    <p class="text-primary" th:text="'$' + ${item.price}"></p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
