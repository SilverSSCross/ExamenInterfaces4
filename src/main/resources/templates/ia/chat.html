<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>IA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">...</nav>
<div class="container mt-4">
    <h1>Asistente IA</h1>
    <div class="row">
        <div class="col-md-5">
            <div class="card mb-3">
                <div class="card-header">Análisis</div>
                <div class="card-body">
                    <form th:action="@{/ia/analizar}" method="post">
                        <button type="submit" class="btn btn-primary">Analizar estadísticas</button>
                    </form>
                </div>
            </div>
            <div class="card">
                <div class="card-header">Preguntar</div>
                <div class="card-body">
                    <form th:action="@{/ia/preguntar}" method="post">
                        <textarea name="pregunta" class="form-control mb-2" rows="3" required></textarea>
                        <button type="submit" class="btn btn-success">Enviar</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-md-7">
            <div class="card">
                <div class="card-header" th:text="${tipo} ?: 'Respuesta'"></div>
                <div class="card-body">
                    <p th:if="${respuesta}" th:text="${respuesta}" style="white-space: pre-line;"></p>
                    <p th:unless="${respuesta}" class="text-muted">Esperando...</p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
