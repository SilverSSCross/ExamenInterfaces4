<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Asistente IA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">...</nav>

<div class="container mt-4">
    <h1>Asistente con IA</h1>

    <div class="row">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <form th:action="@{/ia/preguntar}" method="post">
                        <div class="mb-3">
                            <label for="pregunta" class="form-label">¿Qué quieres saber?</label>
                            <textarea class="form-control" id="pregunta" name="pregunta" rows="4" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Preguntar</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h5>Respuesta:</h5>
                    <div th:if="${respuesta}" class="p-3 bg-light rounded">
                        <p th:text="${respuesta}"></p>
                    </div>
                    <div th:unless="${respuesta}" class="text-muted">
                        <p>Esperando tu pregunta...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
